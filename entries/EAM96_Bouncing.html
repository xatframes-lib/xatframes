<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag actualizado para forzar la correcta escala en mÃ³viles iOS y Android -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bouncing Xat</title>
    <!-- Favicon ampliado para mÃ¡xima compatibilidad (Safari, Chrome, Firefox, iOS, Opera) -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/eamxat/Images/refs/heads/main/favicon-16x16.png">
    <link rel="shortcut icon" type="image/png" href="https://raw.githubusercontent.com/eamxat/Images/refs/heads/main/favicon-16x16.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/eamxat/Images/refs/heads/main/favicon-16x16.png">
    <style>
        /* =========================================
           1. FUENTES, RESET Y OPTIMIZACIÃ“N CROSS-BROWSER
           ========================================= */
        @font-face { 
            font-family: 'TmonMonsori'; 
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/TmonMonsori.woff') format('woff'); 
            font-weight: normal; 
            font-style: normal; 
        }

        * {
            /* Elimina el recuadro azul/gris al tocar elementos en mÃ³viles */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'TmonMonsori', sans-serif;
            margin: 0;
            width: 100%; 
            /* Uso de dvh para mÃ³viles modernos, con fallback vh para navegadores antiguos */
            height: 100vh;
            height: 100dvh; 
            overflow: hidden;
            background-color: #020211;
            /* Suavizado de fuentes para paridad exacta entre Safari, Chrome y Firefox */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-text-size-adjust: 100%;
            /* Evita la selecciÃ³n de cualquier elemento en la pÃ¡gina para mayor protecciÃ³n */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* =========================================
           2. CAPA INFERIOR: GRADIENTES ANIMADOS
           ========================================= */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -2;
            background-size: 400% 400%;
            -webkit-animation: bg-pan 12s ease-in-out infinite;
            animation: bg-pan 12s ease-in-out infinite;
            background-image: linear-gradient(-45deg, #00d2ff 0%, #001b4d 50%, #00d2ff 100%);
            -webkit-transition: background-image 0.5s ease;
            transition: background-image 0.5s ease;
        }

        @-webkit-keyframes bg-pan {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes bg-pan {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Variaciones de colores */
        body:has(#cyc-blue:checked)::after { background-image: linear-gradient(-45deg, #00d2ff 0%, #001b4d 50%, #00d2ff 100%); }
        body:has(#cyc-red:checked)::after { background-image: linear-gradient(-45deg, #ff4e50 0%, #4a0000 50%, #ff4e50 100%); }
        body:has(#cyc-yellow:checked)::after { background-image: linear-gradient(-45deg, #f9d423 0%, #8a3b00 50%, #f9d423 100%); }
        body:has(#cyc-purple:checked)::after { background-image: linear-gradient(-45deg, #d04ed6 0%, #2a004f 50%, #d04ed6 100%); }

        /* =========================================
           3. CAPA MEDIA: LOGO TRANSPARENTE
           ========================================= */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: url("https://i.imgur.com/2JFcesp.png");
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            opacity: 0.04;
            pointer-events: none;
        }

        /* =========================================
           4. CAPA SUPERIOR: TEXTO ANIMADO (RESPONSIVO)
           ========================================= */
        .box {
            position: absolute;
            inset: 0;
            display: flex; 
            justify-content: center;
            align-items: center;
            /* Escalado dinÃ¡mico: MÃ­nimo 40px en mÃ³vil, crece segÃºn la pantalla (12vw), tope de 80px en desktop */
            font-size: clamp(40px, 12vw, 80px);
            color: #fff;
            pointer-events: none;
            white-space: nowrap; /* Evita que la palabra se rompa en dos lÃ­neas en pantallas estrechas */
            -webkit-user-select: none;
            -moz-user-select: none;
            user-select: none; /* Evita seleccionar el texto por error al hacer touch */
        }
        
        .box span {
            position: relative;
            top: 20px;
            display: inline-block;
            -webkit-animation: bounce 0.36s ease infinite alternate;
            animation: bounce 0.36s ease infinite alternate;
            text-shadow: 0 1px #ccc, 0 2px #ccc, 0 3px #ccc, 0 4px #ccc, 0 5px #ccc, 
                         0 6px 0 transparent, 0 7px transparent, 0 8px transparent, 
                         0 9px transparent, 0 10px 10px rgba(0, 0, 0, 0.4);
        }
        
        @-webkit-keyframes bounce {
            100% {
                top: -20px;
                text-shadow: 0 1px #ccc, 0 2px #ccc, 0 3px #ccc, 0 4px #ccc, 0 5px #ccc,
                             0 6px #ccc, 0 7px #ccc, 0 8px #ccc, 0 9px #ccc, 
                             0 50px 25px rgba(0, 0, 0, 0.2);
            }
        }
        @keyframes bounce {
            100% {
                top: -20px;
                text-shadow: 0 1px #ccc, 0 2px #ccc, 0 3px #ccc, 0 4px #ccc, 0 5px #ccc,
                             0 6px #ccc, 0 7px #ccc, 0 8px #ccc, 0 9px #ccc, 
                             0 50px 25px rgba(0, 0, 0, 0.2);
            }
        }
        
        .box span:nth-child(1) { -webkit-animation-delay: 0.0s; animation-delay: 0.0s; }
        .box span:nth-child(2) { -webkit-animation-delay: 0.1s; animation-delay: 0.1s; }
        .box span:nth-child(3) { -webkit-animation-delay: 0.2s; animation-delay: 0.2s; }
        .box span:nth-child(4) { -webkit-animation-delay: 0.3s; animation-delay: 0.3s; }
        .box span:nth-child(5) { -webkit-animation-delay: 0.4s; animation-delay: 0.4s; }
        .box span:nth-child(6) { -webkit-animation-delay: 0.5s; animation-delay: 0.5s; }
        .box span:nth-child(7) { -webkit-animation-delay: 0.6s; animation-delay: 0.6s; }

        /* Ajuste de sombra para pantallas muy pequeÃ±as (MÃ³viles en vertical) para evitar distorsiÃ³n del 3D */
        @media (max-width: 480px) {
            @-webkit-keyframes bounce {
                100% {
                    top: -15px;
                    text-shadow: 0 1px #ccc, 0 2px #ccc, 0 3px #ccc, 0 4px #ccc, 0 5px #ccc,
                                 0 6px #ccc, 0 7px #ccc, 0 25px 15px rgba(0, 0, 0, 0.2);
                }
            }
            @keyframes bounce {
                100% {
                    top: -15px;
                    text-shadow: 0 1px #ccc, 0 2px #ccc, 0 3px #ccc, 0 4px #ccc, 0 5px #ccc,
                                 0 6px #ccc, 0 7px #ccc, 0 25px 15px rgba(0, 0, 0, 0.2);
                }
            }
        }

        /* =========================================
           5. BOTÃ“N CICLADOR DE COLORES
           ========================================= */
        .gradient-cycler {
            position: fixed;
            top: 65px;
            left: 20px;
            width: 24px;
            height: 24px;
            z-index: 9999;
        }

        .gradient-cycler input {
            display: none;
        }

        .current-color-indicator {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.8);
            pointer-events: none;
            -webkit-transition: all 0.3s ease;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, #00d2ff, #001b4d); 
        }

        body:has(#cyc-blue:checked) .current-color-indicator { background: linear-gradient(135deg, #00d2ff, #001b4d); }
        body:has(#cyc-red:checked) .current-color-indicator { background: linear-gradient(135deg, #ff4e50, #4a0000); }
        body:has(#cyc-yellow:checked) .current-color-indicator { background: linear-gradient(135deg, #f9d423, #8a3b00); }
        body:has(#cyc-purple:checked) .current-color-indicator { background: linear-gradient(135deg, #d04ed6, #2a004f); }

        .click-lbl {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
        }

        .gradient-cycler:hover .current-color-indicator {
            -webkit-transform: scale(1.1);
            transform: scale(1.1);
        }

        /* LÃ³gica del ciclo */
        .gradient-cycler:not(:has(input:checked)) .lbl-red { pointer-events: auto; }
        body:has(#cyc-blue:checked) .lbl-red { pointer-events: auto; }
        body:has(#cyc-red:checked) .lbl-yellow { pointer-events: auto; }
        body:has(#cyc-yellow:checked) .lbl-purple { pointer-events: auto; }
        body:has(#cyc-purple:checked) .lbl-blue { pointer-events: auto; }

    </style>
</head>
<!-- Bloqueo nativo HTML de click derecho, arrastre y selecciÃ³n -->
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">
    
    <!-- BotÃ³n Ciclador de Fondo -->
    <div class="gradient-cycler">
        <input type="radio" name="bg-cycle" id="cyc-blue">
        <input type="radio" name="bg-cycle" id="cyc-red">
        <input type="radio" name="bg-cycle" id="cyc-yellow">
        <input type="radio" name="bg-cycle" id="cyc-purple">

        <div class="current-color-indicator"></div>

        <label for="cyc-blue" class="click-lbl lbl-blue"></label>
        <label for="cyc-red" class="click-lbl lbl-red"></label>
        <label for="cyc-yellow" class="click-lbl lbl-yellow"></label>
        <label for="cyc-purple" class="click-lbl lbl-purple"></label>
    </div>

    <!-- Contenedor del Texto Animado -->
    <div class="box">
        <span>X</span>
        <span>a</span>
        <span>t</span>
        <span>.</span>
        <span>c</span>
        <span>o</span>
        <span>m</span>
    </div>

    <!-- =========================================
         SCRIPT DE SEGURIDAD ANTIRROBO
         ========================================= -->
    <script>
        // Bloqueo de teclas de herramientas de desarrollo (F12, Ctrl+Shift+I/J/C, Ctrl+U)
        document.addEventListener('keydown', function(event) {
            // F12
            if (event.keyCode === 123 || event.key === 'F12') {
                event.preventDefault();
                return false;
            }
            // Ctrl + Shift + I (Inspector)
            if (event.ctrlKey && event.shiftKey && (event.keyCode === 73 || event.key === 'I' || event.key === 'i')) {
                event.preventDefault();
                return false;
            }
            // Ctrl + Shift + J (Consola)
            if (event.ctrlKey && event.shiftKey && (event.keyCode === 74 || event.key === 'J' || event.key === 'j')) {
                event.preventDefault();
                return false;
            }
            // Ctrl + Shift + C (Inspector de elementos)
            if (event.ctrlKey && event.shiftKey && (event.keyCode === 67 || event.key === 'C' || event.key === 'c')) {
                event.preventDefault();
                return false;
            }
            // Ctrl + U (Ver cÃ³digo fuente)
            if (event.ctrlKey && (event.keyCode === 85 || event.key === 'U' || event.key === 'u')) {
                event.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>
